name: Build Unsigned iOS App for AltStore

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Link Firebase GoogleService-Info to Xcode
        run: |
          gem install xcodeproj
          cat << 'EOF' > add_firebase.rb
          require 'xcodeproj'
          project_path = 'ios/Runner.xcodeproj'
          project = Xcodeproj::Project.open(project_path)
          target = project.targets.find { |t| t.name == 'Runner' }
          file_path = 'Runner/GoogleService-Info.plist'
          file_ref = project.main_group.find_file_by_path(file_path) || project.main_group.new_file(file_path)
          unless target.resources_build_phase.files_references.include?(file_ref)
            target.resources_build_phase.add_file_reference(file_ref)
            puts "GoogleService-Info.plist perfectly embedded inside your app bundle!"
          end
          project.save
          EOF
          ruby add_firebase.rb
          rm add_firebase.rb

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Disable Xcode Code Signing & Apply Fake Team
        run: |
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
          
      - name: Build iOS App (Release, No Code Sign)
        run: flutter build ios --release --no-codesign || true

      - name: Build Runner.app with xcodebuild (Force Unsigned)
        run: |
          cd ios
          xcodebuild build -workspace Runner.xcworkspace -scheme Runner -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - name: Package .app into .ipa for AltStore
        run: |
          mkdir -p Payload
          # Locate Runner.app dynamically to prevent path issues
          APP_PATH=$(find . -name "Runner.app" -type d | grep "Release" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "Runner.app" -type d | head -n 1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: Runner.app not found!"
            exit 1
          fi
          
          echo "Found Runner.app at: $APP_PATH"
          cp -R "$APP_PATH" Payload/
          zip -r Runner.ipa Payload/

      - name: Upload .ipa Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Runner-AltStore-App
          path: Runner.ipa
