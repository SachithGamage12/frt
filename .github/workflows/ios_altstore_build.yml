name: Build Unsigned iOS App for AltStore

on:
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Disable Xcode Code Signing
        run: |
          echo "CODE_SIGNING_ALLOWED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGNING_REQUIRED=NO" >> ios/Flutter/Release.xcconfig
          echo "CODE_SIGN_IDENTITY=" >> ios/Flutter/Release.xcconfig
          
      - name: Build Unsigned iOS Archive (Release)
        run: flutter build ipa --release --no-codesign

      - name: Package .xcarchive into .ipa for AltStore
        run: |
          # Create Payload directory
          mkdir -p build/ios/Payload
          
          # Move the Runner.app from xcarchive into the Payload directory
          mv build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app build/ios/Payload/
          
          # Zip the Payload directory into a .ipa file
          cd build/ios
          zip -r Runner.ipa Payload/

      - name: Upload .ipa Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Runner-AltStore-App
          path: build/ios/Runner.ipa
