name: "iOS Official Signed Build"

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build Signed IPA
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Apple Certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATES_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH

      - name: Install Provisioning Profile (UUID-based manual)
        env:
          PROVISION_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/temp.mobileprovision
          echo -n "$PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          
          # Extract UUID from the profile
          UUID=$(security cms -D -i $PP_PATH | grep -A 1 "UUID" | tail -1 | sed 's/.*<string>//;s/<\/string>.*//')
          echo "Extracted UUID: $UUID"
          
          # Place in the correct location with UUID filename
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH "~/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"
          
          echo "Profile successfully installed at ~/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"

      - name: Validate Signing Configuration
        run: |
          echo "=== Bundle ID Check ==="
          BUNDLE_ID=$(grep -A5 "Release" ios/Runner.xcodeproj/project.pbxproj | grep "PRODUCT_BUNDLE_IDENTIFIER" | head -1 | sed 's/.*= //' | sed 's/;//' | xargs)
          echo "Bundle ID for Release: $BUNDLE_ID"
          
          echo "=== Installed Provisioning Profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
          
          echo "=== Available Signing Identities ==="
          security find-identity -v -p codesigning

      - name: Link Firebase GoogleService-Info
        run: |
          gem install xcodeproj
          cat << 'EOF' > add_firebase.rb
          require 'xcodeproj'
          project_path = 'ios/Runner.xcodeproj'
          project = Xcodeproj::Project.open(project_path)
          target = project.targets.find { |t| t.name == 'Runner' }
          file_path = 'Runner/GoogleService-Info.plist'
          file_ref = project.main_group.find_file_by_path(file_path) || project.main_group.new_file(file_path)
          unless target.resources_build_phase.files_references.include?(file_ref)
            target.resources_build_phase.add_file_reference(file_ref)
          end
          project.save
          EOF
          ruby add_firebase.rb

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Clean and Prepare Build Environment
        run: |
          flutter clean
          flutter pub get
          cd ios
          pod install --repo-update

      - name: Build IPA (Verbose)
        run: |
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist \
            -v

      - name: Find and Diagnostics (Always)
        if: always()
        run: |
          echo "=== Post-build Diagnostics ==="
          find . -name "*.ipa" || echo "No IPA found"
          find build/ios -name "*.app" || echo "No APP found"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: error

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
