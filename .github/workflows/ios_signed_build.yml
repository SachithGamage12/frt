name: "iOS Official Signed Build"

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build Signed IPA
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Apple Certificate and Profile (UUID-based Manual)
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATES_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -e
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "=== Decoding certificate ==="
          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH
          echo "Certificate file size: $(wc -c < $CERT_PATH) bytes"

          echo "=== Setting up keychain ==="
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          echo "=== Importing certificate (if this fails, P12_PASSWORD is wrong) ==="
          security import $CERT_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          echo "✅ Certificate imported successfully"

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH

          echo "=== Verifying identity is available ==="
          IDENTITY_COUNT=$(security find-identity -v -p codesigning | grep -c "Apple Distribution" || true)
          echo "Found $IDENTITY_COUNT Apple Distribution identity(ies)"
          if [ "$IDENTITY_COUNT" -eq "0" ]; then
            echo "❌ FATAL: No Apple Distribution identity found after import."
            echo "   Check that P12_PASSWORD secret matches the password of your ios_distribution.p12 file."
            exit 1
          fi

          PP_PATH=$RUNNER_TEMP/temp.mobileprovision
          echo -n "$PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          security cms -D -i $PP_PATH > /tmp/pp.plist
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /tmp/pp.plist)
          NAME=$(/usr/libexec/PlistBuddy -c "Print Name" /tmp/pp.plist)
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV
          echo "PROFILE_NAME=$NAME" >> $GITHUB_ENV
          echo "Profile UUID: $UUID"
          echo "Profile Name: $NAME"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PP_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"

      - name: Validate Configuration (Debug)
        run: |
          echo "=== Identities ==="
          security find-identity -v -p codesigning
          echo "=== Profiles dir ==="
          ls -la "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: Verify Firebase Config
        run: |
          if [ ! -f "ios/Runner/GoogleService-Info.plist" ]; then
            echo "ERROR: GoogleService-Info.plist missing!"
            exit 1
          fi
          echo "GoogleService-Info.plist found OK"

      - name: Link Firebase GoogleService-Info
        run: |
          gem install xcodeproj
          cat << 'EOF' > add_firebase.rb
          require 'xcodeproj'
          project_path = 'ios/Runner.xcodeproj'
          project = Xcodeproj::Project.open(project_path)
          target = project.targets.find { |t| t.name == 'Runner' }
          file_path = 'Runner/GoogleService-Info.plist'
          file_ref = project.main_group.find_file_by_path(file_path) || project.main_group.new_file(file_path)
          unless target.resources_build_phase.files_references.include?(file_ref)
            target.resources_build_phase.add_file_reference(file_ref)
          end
          project.save
          EOF
          ruby add_firebase.rb

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Clean and Prepare
        run: |
          flutter clean
          flutter pub get
          cd ios
          pod install --repo-update

      - name: Step 1 - Build Flutter iOS (no sign)
        run: flutter build ios --release --no-codesign -v

      - name: Step 2 - Archive with Xcode
        run: |
          set -o pipefail
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -resultBundlePath $RUNNER_TEMP/ResultBundle \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution: Sachith Gamage (KMPA36RSLQ)" \
            DEVELOPMENT_TEAM=KMPA36RSLQ \
            PROVISIONING_PROFILE=$PROFILE_UUID \
            archive 2>&1 | tee $RUNNER_TEMP/xcodebuild.log
          echo ""
          echo "=== KEY ERRORS FROM BUILD ==="
          grep -E "^(error:|warning: .*(error|failed)|.*FAILED)" $RUNNER_TEMP/xcodebuild.log | head -30 || echo "No explicit errors found in filter"

      - name: Step 3 - Export IPA from Archive
        run: |
          mkdir -p build/ios/ipa

          # Generate fresh ExportOptions.plist with dynamic profile UUID
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>KMPA36RSLQ</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.sachith.familytrack.ios</key>
              <string>$PROFILE_UUID</string>
            </dict>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF

          echo "Using Profile UUID: $PROFILE_UUID"

          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -verbose

      - name: Post-build Diagnostics (Always)
        if: always()
        run: |
          echo "=== IPA Search ==="
          find . -name "*.ipa" 2>/dev/null || echo "No IPA found"
          echo "=== Archive Search ==="
          find $RUNNER_TEMP -name "*.xcarchive" 2>/dev/null || echo "No xcarchive"
          echo "=== Export path ==="
          ls -la build/ios/ipa/ 2>/dev/null || echo "No ipa dir"

      - name: Upload Xcode Result Bundle (On Failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-result-bundle
          path: |
            ${{ runner.temp }}/ResultBundle
            ${{ runner.temp }}/xcodebuild.log
          if-no-files-found: warn

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: error

      - name: Upload to TestFlight (App Store Connect)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
        run: |
          echo "=== Starting Upload to TestFlight ==="
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "❌ ERROR: No IPA found for upload!"
            exit 1
          fi
          xcrun altool --upload-app --type ios --file "$IPA_PATH" --username "$APPLE_ID" --password "$APPLE_ID_PASSWORD"
          echo "✅ Upload Successful (Wait ~15 mins for processing on Apple site)"

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
