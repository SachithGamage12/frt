name: "iOS Official Signed Build"

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    name: Build Signed IPA
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Import Apple Certificates and Provisioning Profiles
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.CERTIFICATES_P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}
          mobileprovision-base64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Validate Signing Configuration
        run: |
          echo "=== Bundle ID Check ==="
          # Look for the bundle ID specifically in the Release section
          BUNDLE_ID=$(grep -A5 "Release" ios/Runner.xcodeproj/project.pbxproj | grep "PRODUCT_BUNDLE_IDENTIFIER" | head -1 | sed 's/.*= //' | sed 's/;//' | xargs)
          echo "Bundle ID for Release: $BUNDLE_ID"
          
          echo "=== Installed Provisioning Profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || echo "Folder not found yet"
          
          echo "=== Available Signing Identities ==="
          security find-identity -v -p codesigning

      - name: Verify Firebase and Signing Configs
        run: |
          if [ ! -f "ios/Runner/GoogleService-Info.plist" ]; then
            echo "ERROR: GoogleService-Info.plist not found!"
            exit 1
          fi
          if [ ! -f "ios/ExportOptions.plist" ]; then
            echo "ERROR: ExportOptions.plist not found!"
            exit 1
          fi

      - name: Link Firebase GoogleService-Info to Xcode
        run: |
          gem install xcodeproj
          cat << 'EOF' > add_firebase.rb
          require 'xcodeproj'
          project_path = 'ios/Runner.xcodeproj'
          project = Xcodeproj::Project.open(project_path)
          target = project.targets.find { |t| t.name == 'Runner' }
          file_path = 'Runner/GoogleService-Info.plist'
          file_ref = project.main_group.find_file_by_path(file_path) || project.main_group.new_file(file_path)
          unless target.resources_build_phase.files_references.include?(file_ref)
            target.resources_build_phase.add_file_reference(file_ref)
          end
          project.save
          EOF
          ruby add_firebase.rb

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Clean and Prepare Build Environment
        run: |
          flutter clean
          flutter pub get
          cd ios
          pod install --repo-update

      - name: Build IPA (Verbose)
        run: |
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist \
            -v

      - name: Find and Diagnostics (Always runs if Build fails)
        if: always()
        run: |
          echo "=== Post-build Diagnostics ==="
          find . -name "*.ipa" || echo "No IPA found"
          find . -name "*.app" || echo "No APP found"
          ls -R build/ios || echo "Build/ios directory missing"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: error

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db
